<app-section-shell
  code="2.2"
  [title]="'sections.for.title' | translate"
  [theory]="'sections.for.theory' | translate"
  [docUrl]="docUrl"
  [simile]="'sections.for.simile' | translate"
  [examples]="'sections.for.examples' | translate"
>
  <!-- Código del ejercicio (con TODOs), copiable. Se proyecta en la mitad izquierda. -->
  <app-code-block
    exercise-code
    [code]="exerciseCode"
    language="HTML"
    filename="for-exercise.html"
  />

  <!-- Ejercicio en vivo. Se proyecta en la mitad derecha ("Resultado"). -->
  <app-for-exercise exercise-result />
</app-section-shell>
