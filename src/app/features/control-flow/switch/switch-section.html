<app-section-shell
  code="2.3"
  [title]="'sections.switch.title' | translate"
  [theory]="'sections.switch.theory' | translate"
  [docUrl]="docUrl"
  [simile]="'sections.switch.simile' | translate"
  [examples]="'sections.switch.examples' | translate"
>
  <!-- Código del ejercicio (con TODOs), copiable. Se proyecta en la mitad izquierda. -->
  <app-code-block
    exercise-code
    [code]="exerciseCode"
    language="HTML"
    filename="switch-exercise.html"
  />

  <!-- Ejercicio en vivo. Se proyecta en la mitad derecha ("Resultado"). -->
  <app-switch-exercise exercise-result />
</app-section-shell>
