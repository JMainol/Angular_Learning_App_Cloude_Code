<app-section-shell
  code="2.1"
  [title]="'sections.if.title' | translate"
  [theory]="'sections.if.theory' | translate"
  [docUrl]="docUrl"
  [simile]="'sections.if.simile' | translate"
  [examples]="'sections.if.examples' | translate"
>
  <!-- Código del ejercicio (con TODOs), copiable. Se proyecta en la mitad izquierda. -->
  <app-code-block
    exercise-code
    [code]="exerciseCode"
    language="HTML"
    filename="if-exercise.html"
  />

  <!-- Ejercicio en vivo. Se proyecta en la mitad derecha ("Resultado"). -->
  <app-if-exercise exercise-result />
</app-section-shell>
