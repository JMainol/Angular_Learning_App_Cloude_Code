<div class="panel">
  <div class="cart">
    <div class="cart__row">
      <span>Precio unitario</span>
      <strong>{{ precioUnitario() }} €</strong>
    </div>

    <div class="cart__row">
      <span>Cantidad</span>
      <span class="stepper">
        <button type="button" class="stepper__btn" (click)="menos()" aria-label="Menos">−</button>
        <strong class="stepper__value">{{ cantidad() }}</strong>
        <button type="button" class="stepper__btn" (click)="mas()" aria-label="Más">+</button>
      </span>
    </div>

    <hr class="cart__sep" />

    <!-- Computed resuelto: se recalcula solo al cambiar precio o cantidad. -->
    <div class="cart__row">
      <span>Subtotal</span>
      <strong>{{ subtotal() }} €</strong>
    </div>

    <div class="cart__row">
      <span>IVA (21%)</span>
      <strong>{{ iva() }} €</strong>
    </div>

    <!-- TODO 1: muestra el IVA (21%) usando el computed `iva`:
         <div class="cart__row">
           <span>IVA (21%)</span>
           <strong>{{ iva() }} €</strong>
         </div> -->

    <div class="cart__row" cart__row--total>
      <span>Total</span>
      <strong>{{ total() }} €</strong>
    </div>

    <!-- TODO 2: muestra el total usando el computed `total` (resáltalo):
         <div class="cart__row cart__row--total">
           <span>Total</span>
           <strong>{{ total() }} €</strong>
         </div> -->
  </div>
</div>
